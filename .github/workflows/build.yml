name: Build Xamarin Sample APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: macos-15-intel
    timeout-minutes: 120

    env:
      CONFIGURATION: Release
      ANDROID_HOME: /Users/runner/Library/Android/sdk

    steps:
      - uses: actions/checkout@v5

      - name: Install Mono
        run: |
          if command -v msbuild &>/dev/null; then
            echo "msbuild already available"
            msbuild -version
          else
            echo "Installing Mono..."
            wget -q https://download.mono-project.com/archive/6.12.0/macos-10-universal/MonoFramework-MDK-6.12.0.206.macos10.xamarin.universal.pkg -O /tmp/mono.pkg
            sudo installer -pkg /tmp/mono.pkg -target /
            export PATH="/Library/Frameworks/Mono.framework/Versions/Current/Commands:$PATH"
            echo "/Library/Frameworks/Mono.framework/Versions/Current/Commands" >> $GITHUB_PATH
            mono --version
            msbuild -version
          fi

      - name: Install Xamarin.Android
        run: |
          if [ -f "/Library/Frameworks/Xamarin.Android.framework/Versions/Current/Version" ]; then
            echo "Xamarin.Android already installed"
            cat /Library/Frameworks/Xamarin.Android.framework/Versions/Current/Version
          else
            echo "Installing Xamarin.Android 13.2..."
            wget -q https://aka.ms/xamarin-android-commercial-d17-8-macos -O /tmp/xa.pkg 2>/dev/null || \
            wget -q https://dl.google.com/dl/android/studio/install/xamarin.android-13.2.0.0.pkg -O /tmp/xa.pkg 2>/dev/null || \
            wget -q "https://download.visualstudio.microsoft.com/download/pr/1a3b1fa0-0649-4e9e-a3a6-1b48f78a272a/0f04a4e1064c3e1cccc2fbe6ec5b26ba/xamarin.android-13.2.2.1.pkg" -O /tmp/xa.pkg
            sudo installer -pkg /tmp/xa.pkg -target /
          fi

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install "platforms;android-33" "build-tools;32.0.0" 2>/dev/null || true

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: NuGet restore
        run: msbuild TrueMetricsBindingSample.sln -t:Restore -p:Configuration=$CONFIGURATION -nologo -v:minimal

      - name: Build solution
        run: msbuild TrueMetricsBindingSample.sln -t:Build -p:Configuration=$CONFIGURATION -nologo -m -v:minimal

      - name: Package APK
        run: msbuild src/TrueMetricsSample.Droid/TrueMetricsSample.Droid.csproj -t:SignAndroidPackage -p:Configuration=$CONFIGURATION -nologo -v:minimal

      - name: Locate artifacts
        id: artifacts
        run: |
          APK_DIR="src/TrueMetricsSample.Droid/bin/$CONFIGURATION"
          if [ -d "$APK_DIR" ]; then
            echo "=== Build output ==="
            ls -lh "$APK_DIR/"
            APK=$(find "$APK_DIR" -name "*.apk" -type f | head -1)
            if [ -n "$APK" ]; then
              echo "apk_path=$APK" >> "$GITHUB_OUTPUT"
              echo "APK: $APK ($(du -h "$APK" | cut -f1))"
            fi
          else
            echo "::error::Output directory not found: $APK_DIR"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: truemetrics-xamarin-sample-${{ env.CONFIGURATION }}
          path: |
            src/TrueMetricsSample.Droid/bin/${{ env.CONFIGURATION }}/**/*.apk
            src/TrueMetricsSample.Droid/bin/${{ env.CONFIGURATION }}/**/*.dll
          if-no-files-found: warn
          retention-days: 14
